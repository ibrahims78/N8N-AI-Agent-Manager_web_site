kind = "web"
previewPath = "/"
title = "N8N AI Agent Manager"
version = "1.0.0"
id = "artifacts/n8n-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18898

[services.development]
run = "pnpm --filter @workspace/n8n-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/n8n-manager", "run", "build" ]
publicDir = "artifacts/n8n-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18898"
BASE_PATH = "/"
